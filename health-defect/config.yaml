benchmark_name: "health-defect-correlation"
version: "1.3"

defaults:
  defect_window_months: 6
  min_nloc: 10
  exclude_test_files: true
  health_buckets: [4.0, 6.0, 8.0]
  precision_k: 20

# Calibration corpus — 13 repos across 5 languages (Python, TypeScript,
# JavaScript, Rust, Go), each with REAL defect signal in the 6-month window
# (audited: every repo here has >=5 defect-bearing source files; ~216 positives
# total, ~9 per biomarker feature). Selection criteria:
#   1. Indexes in well under 10 min (favor few *total* files — docs/website
#      trees dominate index time, hence the `exclude` lists below).
#   2. Clean defect signal: Conventional Commits (`fix:` / `fix(scope):`)
#      mapped onto the `keyword` strategy.
#   3. Language + domain variety so calibration is not a Python monoculture.
#
# DROPPED after a defect-signal audit (mature/low-velocity → ~0 fixes touching
# source in the window, which only adds all-negative noise): starlette (0),
# httpx (0), flask (2), express (2), ripgrep (1), cobra (3). Also dropped:
# django/fastapi (too slow / doc-heavy window). Also EXCLUDED from the
# calibration corpus on representativeness grounds (profiled internally, not
# reported): requests (only 14 files post-filter → unstable per-repo estimate)
# and valibot (out-of-distribution: hundreds of trivial one-validator-per-file
# modules — health's complexity signal is not designed for that shape).
#
# Per-repo fields:
#   source_root  — defects are attributed only to changed files under this
#                  prefix with a matching `extensions` suffix ("" = repo root).
#   extensions   — source-file suffixes (defaults to [".py"] when omitted).
#   exclude      — gitignore-style dirs skipped at INDEX time (-x). Drop
#                  docs/website/examples/benchmarks; NEVER drop test dirs —
#                  has_test_file / untested_hotspot need tests indexed to pair
#                  source<->test.
#   t0_date      — health is scored at the commit on/before this date
#                  (--score-at t0, default); defects are counted t0..HEAD.
repos:
  # ---- Python (3) ----
  - name: "pydantic"
    repo_url: "https://github.com/pydantic/pydantic.git"
    language: "python"
    source_root: "pydantic/"
    extensions: [".py"]
    t0_date: "2025-11-23"
    defect_strategy: "keyword"
    bug_keywords: ["fix", "bug", "patch", "resolve"]
    exclude_keywords: ["typo", "docs", "style", "lint", "bump", "chore", "format", "deps"]
    exclude: ["docs/", "pydantic-core/", ".github/"]

  - name: "rich"
    repo_url: "https://github.com/Textualize/rich.git"
    language: "python"
    source_root: "rich/"
    extensions: [".py"]
    t0_date: "2025-11-23"
    defect_strategy: "keyword"
    bug_keywords: ["fix", "bug", "patch", "resolve"]
    exclude_keywords: ["typo", "docs", "style", "lint", "bump", "chore", "format", "deps"]
    exclude: ["docs/", "imgs/", ".github/"]

  - name: "litestar"
    repo_url: "https://github.com/litestar-org/litestar.git"
    language: "python"
    source_root: "litestar/"
    extensions: [".py"]
    t0_date: "2025-11-23"
    defect_strategy: "keyword"
    bug_keywords: ["fix", "bug", "patch", "resolve"]
    exclude_keywords: ["typo", "docs", "style", "lint", "bump", "chore", "format", "deps"]
    exclude: ["docs/", ".github/"]

  # ---- TypeScript (2) ----
  - name: "hono"
    repo_url: "https://github.com/honojs/hono.git"
    language: "typescript"
    source_root: "src/"
    extensions: [".ts", ".tsx"]
    t0_date: "2025-11-23"
    defect_strategy: "keyword"
    bug_keywords: ["fix", "bug", "patch", "resolve"]
    exclude_keywords: ["typo", "docs", "style", "lint", "bump", "chore", "format", "deps"]
    exclude: ["benchmarks/", "perf-measures/", "docs/", "build/", ".github/"]

  - name: "zod"
    repo_url: "https://github.com/colinhacks/zod.git"
    language: "typescript"
    source_root: "packages/zod/src/"
    extensions: [".ts", ".tsx"]
    t0_date: "2025-11-23"
    defect_strategy: "keyword"
    bug_keywords: ["fix", "bug", "patch", "resolve"]
    exclude_keywords: ["typo", "docs", "style", "lint", "bump", "chore", "format", "deps"]
    exclude: ["packages/docs/", "packages/docs-v3/", "packages/bench/", "logo/", "scripts/", ".github/"]

  # ---- JavaScript (2) ----
  - name: "axios"
    repo_url: "https://github.com/axios/axios.git"
    language: "javascript"
    source_root: "lib/"
    extensions: [".js"]
    t0_date: "2025-11-23"
    defect_strategy: "keyword"
    bug_keywords: ["fix", "bug", "patch", "resolve"]
    exclude_keywords: ["typo", "docs", "style", "lint", "bump", "chore", "format", "deps"]
    exclude: ["docs/", "examples/", "sandbox/", ".github/"]

  - name: "fastify"
    repo_url: "https://github.com/fastify/fastify.git"
    language: "javascript"
    source_root: "lib/"
    extensions: [".js"]
    t0_date: "2025-11-23"
    defect_strategy: "keyword"
    bug_keywords: ["fix", "bug", "patch", "resolve"]
    exclude_keywords: ["typo", "docs", "style", "lint", "bump", "chore", "format", "deps"]
    exclude: ["docs/", "examples/", "build/", "benchmarks/", ".github/"]

  # ---- Rust (3) ----
  - name: "clap"
    repo_url: "https://github.com/clap-rs/clap.git"
    language: "rust"
    source_root: ""          # workspace: src, clap_builder/src, clap_derive/src, ...
    extensions: [".rs"]
    t0_date: "2025-11-23"
    defect_strategy: "keyword"
    bug_keywords: ["fix", "bug", "patch", "resolve"]
    exclude_keywords: ["typo", "docs", "style", "lint", "bump", "chore", "format", "deps"]
    exclude: ["examples/", ".github/"]

  - name: "fd"
    repo_url: "https://github.com/sharkdp/fd.git"
    language: "rust"
    source_root: "src/"
    extensions: [".rs"]
    t0_date: "2025-11-23"
    defect_strategy: "keyword"
    bug_keywords: ["fix", "bug", "patch", "resolve"]
    exclude_keywords: ["typo", "docs", "style", "lint", "bump", "chore", "format", "deps"]
    exclude: ["doc/", "contrib/", "scripts/", ".github/"]

  - name: "bat"
    repo_url: "https://github.com/sharkdp/bat.git"
    language: "rust"
    source_root: "src/"
    extensions: [".rs"]
    t0_date: "2025-11-23"
    defect_strategy: "keyword"
    bug_keywords: ["fix", "bug", "patch", "resolve"]
    exclude_keywords: ["typo", "docs", "style", "lint", "bump", "chore", "format", "deps"]
    exclude: ["assets/", "doc/", "contrib/", ".github/"]

  # ---- Go (3) ----
  - name: "gin"
    repo_url: "https://github.com/gin-gonic/gin.git"
    language: "go"
    source_root: ""
    extensions: [".go"]
    t0_date: "2025-11-23"
    defect_strategy: "keyword"
    bug_keywords: ["fix", "bug", "patch", "resolve"]
    exclude_keywords: ["typo", "docs", "style", "lint", "bump", "chore", "format", "deps"]
    exclude: [".github/"]

  - name: "chi"
    repo_url: "https://github.com/go-chi/chi.git"
    language: "go"
    source_root: ""
    extensions: [".go"]
    t0_date: "2025-11-23"
    defect_strategy: "keyword"
    bug_keywords: ["fix", "bug", "patch", "resolve"]
    exclude_keywords: ["typo", "docs", "style", "lint", "bump", "chore", "format", "deps"]
    exclude: ["_examples/", ".github/"]

  - name: "fiber"
    repo_url: "https://github.com/gofiber/fiber.git"
    language: "go"
    source_root: ""
    extensions: [".go"]
    t0_date: "2025-11-23"
    defect_strategy: "keyword"
    bug_keywords: ["fix", "bug", "patch", "resolve"]
    exclude_keywords: ["typo", "docs", "style", "lint", "bump", "chore", "format", "deps"]
    exclude: ["docs/", ".github/"]

  # ---- Java (2) — added for full-tier-language breadth ----
  # Defect-signal audit (audit_candidates.py, window since 2025-11-23, non-test
  # source files touched by keyword fix commits): mockito 13, caffeine 164.
  # Both clear the >=5 bar comfortably. (gson dropped: only 4 non-test.)
  - name: "mockito"
    repo_url: "https://github.com/mockito/mockito.git"
    language: "java"
    source_root: "mockito-core/src/main/java/"
    extensions: [".java"]
    t0_date: "2025-11-23"
    defect_strategy: "keyword"
    bug_keywords: ["fix", "bug", "patch", "resolve"]
    exclude_keywords: ["typo", "docs", "style", "lint", "bump", "chore", "format", "deps"]
    exclude: [".github/", "doc/"]

  - name: "caffeine"
    repo_url: "https://github.com/ben-manes/caffeine.git"
    language: "java"
    # Scope to the main cache module so testFixtures/ and jmh/ (which the
    # generic /test/ filter does NOT catch) don't pollute the source universe.
    source_root: "caffeine/src/main/java/"
    extensions: [".java"]
    t0_date: "2025-11-23"
    defect_strategy: "keyword"
    bug_keywords: ["fix", "bug", "patch", "resolve"]
    exclude_keywords: ["typo", "docs", "style", "lint", "bump", "chore", "format", "deps"]
    exclude: [".github/"]

  # ---- Kotlin (2) ----
  # Audit non-test source files: detekt 31, coroutines 20.
  - name: "detekt"
    repo_url: "https://github.com/detekt/detekt.git"
    language: "kotlin"
    source_root: ""          # multi-module; */src/test/ dropped by the /test/ filter
    extensions: [".kt"]
    t0_date: "2025-11-23"
    defect_strategy: "keyword"
    bug_keywords: ["fix", "bug", "patch", "resolve"]
    exclude_keywords: ["typo", "docs", "style", "lint", "bump", "chore", "format", "deps"]
    exclude: [".github/", "website/", "docs/"]

  - name: "coroutines"
    repo_url: "https://github.com/Kotlin/kotlinx.coroutines.git"
    language: "kotlin"
    source_root: ""
    extensions: [".kt"]
    t0_date: "2025-11-23"
    defect_strategy: "keyword"
    bug_keywords: ["fix", "bug", "patch", "resolve"]
    exclude_keywords: ["typo", "docs", "style", "lint", "bump", "chore", "format", "deps"]
    exclude: [".github/", "docs/", "benchmarks/", "site/", "integration-testing/", "ui/"]

  # ---- C++ (2) ----
  # Audit non-test source files: spdlog 16, fmt 8. Header-heavy libs; tests in
  # test(s)/ dropped by the filter. nlohmann/json dropped (single-header → poor
  # file granularity, the valibot failure mode).
  - name: "spdlog"
    repo_url: "https://github.com/gabime/spdlog.git"
    language: "cpp"
    source_root: ""
    extensions: [".h", ".hpp", ".cpp", ".cc"]
    t0_date: "2025-11-23"
    defect_strategy: "keyword"
    bug_keywords: ["fix", "bug", "patch", "resolve"]
    exclude_keywords: ["typo", "docs", "style", "lint", "bump", "chore", "format", "deps"]
    exclude: [".github/", "bench/", "example/", "logos/", "scripts/", "cmake/"]

  - name: "fmt"
    repo_url: "https://github.com/fmtlib/fmt.git"
    language: "cpp"
    source_root: ""
    extensions: [".h", ".hpp", ".cc", ".cpp"]
    t0_date: "2025-11-23"
    defect_strategy: "keyword"
    bug_keywords: ["fix", "bug", "patch", "resolve"]
    exclude_keywords: ["typo", "docs", "style", "lint", "bump", "chore", "format", "deps"]
    exclude: [".github/", "doc/", "support/"]

  # ---- C# (2) ----
  # Audit non-test source files: npgsql 20, quartznet 41. (polly/serilog/dapper/
  # restsharp/mqttnet dropped — mature/stable or thin signal. dotnet/efcore had
  # great signal (137) but exceeded the 30-min T0 index budget — the
  # fast-indexing criterion rules it out.)
  - name: "npgsql"
    repo_url: "https://github.com/npgsql/npgsql.git"
    language: "csharp"
    source_root: "src/"
    extensions: [".cs"]
    t0_date: "2025-11-23"
    defect_strategy: "keyword"
    bug_keywords: ["fix", "bug", "patch", "resolve"]
    exclude_keywords: ["typo", "docs", "style", "lint", "bump", "chore", "format", "deps"]
    exclude: [".github/", "doc/", "test/", "benchmarks/"]

  - name: "quartznet"
    repo_url: "https://github.com/quartznet/quartznet.git"
    language: "csharp"
    source_root: "src/"
    extensions: [".cs"]
    t0_date: "2025-11-23"
    defect_strategy: "keyword"
    bug_keywords: ["fix", "bug", "patch", "resolve"]
    exclude_keywords: ["typo", "docs", "style", "lint", "bump", "chore", "format", "deps"]
    exclude: [".github/", "doc/", "database/", "test/", "tests/"]

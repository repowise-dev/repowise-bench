# Dry run: validates the full pipeline works end-to-end
# Run this FIRST before burning real money

experiment_name: "dry_run"

benchmarks:
  swe_qa:
    enabled: true
    max_tasks: 5
    # Pick tasks from different question types for a sanity check
    question_types: ["What", "Why", "Where", "How"]
    repos: ["django/django"]  # Start with the biggest repo

  swe_bench:
    enabled: false  # Skip for dry run
    max_tasks: 0

  fea_bench:
    enabled: false  # Skip for dry run
    max_tasks: 0

conditions:
  - name: "C0_bare"
    repowise_enabled: false
    repowise_mode: null
    claude_md: false
    plugin_skills: false

agent:
  model: "claude-sonnet-4-20250514"
  max_turns: 15
  timeout_seconds: 300

repowise:
  # Path to repowise binary/package
  binary: "repowise"
  # Where to store indexes
  index_dir: "./indexes"
  # LLM for doc generation (use cheapest)
  doc_model: "gemini-2.0-flash-lite"

paths:
  results_dir: "./results/dry_run"
  repos_dir: "./repos"
  logs_dir: "./logs/dry_run"

# Cost guardrails
budget:
  max_total_usd: 5.0
  max_per_task_usd: 2.0
  abort_on_exceed: true

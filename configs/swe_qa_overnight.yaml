# SWE-QA overnight run
# C0 (bare) vs C1 (repowise index-only: graph + git intelligence)
#
# 720 tasks across 15 repos x 2 conditions = 1440 runs
#
# Setup:
#   python scripts/download_benchmarks.py --benchmark swe_qa
#
# Run:
#   python harness/run_experiment.py --config configs/swe_qa_overnight.yaml
#
# Safe to Ctrl-C and resume — progress saves after every task.
# Handles rate limits with exponential backoff (up to 15 min waits).

experiment_name: "swe_qa_overnight_v1"

benchmarks:
  swe_qa:
    enabled: true
    max_tasks: null   # all tasks for selected repos
    repos:
      # Small (quick)
      - "psf/requests"              #  48 tasks
      - "pallets/flask"             #  48 tasks
      - "pytest-dev/pytest"         #  48 tasks
      - "pylint-dev/pylint"         #  48 tasks
      # Large — where repowise should differentiate most
      - "django/django"             #  48 tasks (massive codebase)
      - "sympy/sympy"               #  48 tasks (complex math)
      - "sphinx-doc/sphinx"         #  48 tasks
      - "matplotlib/matplotlib"     #  48 tasks
      - "scikit-learn/scikit-learn" #  48 tasks
      - "astropy/astropy"           #  48 tasks
      - "pydata/xarray"             #  48 tasks
      - "conan-io/conan"            #  48 tasks
      - "reflex-dev/reflex"         #  48 tasks
      - "sqlfluff/sqlfluff"         #  48 tasks
      - "streamlink/streamlink"     #  48 tasks

  swe_bench:
    enabled: false
  fea_bench:
    enabled: false

conditions:
  - name: "C0_bare"
    repowise_enabled: false
    repowise_mode: null
    claude_md: false
    plugin_skills: false

  - name: "C1_graph_git"
    repowise_enabled: true
    repowise_mode: "index-only"
    claude_md: false
    plugin_skills: false

agent:
  model: "sonnet"
  max_turns: 15
  timeout_seconds: 300    # 5 min per task (Q&A is faster than bug fixing)

repowise:
  binary: "repowise"
  index_dir: "./indexes"
  doc_model: "gemini-3.1-flash-lite-preview"

paths:
  results_dir: "./results/swe_qa_overnight_v1"
  repos_dir: "./repos"
  logs_dir: "./logs/swe_qa_overnight_v1"

budget:
  max_total_usd: 200.0
  max_per_task_usd: 2.0
  abort_on_exceed: true

evaluation:
  judge_model: "sonnet"
  dimensions: ["correctness", "completeness", "relevance", "clarity", "reasoning"]

# Parallel execution
parallelism:
  max_workers: 2   # 2 concurrent Claude sessions (conservative for rate limits)

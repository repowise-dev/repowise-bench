# C0 vs C1 vs C2 comparison on repowise-advantaged repos
# Repos chosen for high density of architecture/dependency/cross-file questions.
#
# 144 tasks x 3 conditions = 432 runs
#
# Run:
#   python harness/run_experiment.py --config configs/swe_qa_c2_test.yaml
#
# Safe to Ctrl-C and resume.

experiment_name: "swe_qa_c2_test"

benchmarks:
  swe_qa:
    enabled: true
    max_tasks: null
    repos:
      # Highest % of architecture/dependency/cross-file questions:
      - "django/django"             # 67% advantaged, massive codebase
      - "scikit-learn/scikit-learn" # 62% advantaged, complex module hierarchy
      - "sympy/sympy"               # 56% advantaged, deep abstractions

  swe_bench:
    enabled: false
  fea_bench:
    enabled: false

conditions:
  - name: "C0_bare"
    repowise_enabled: false
    repowise_mode: null
    claude_md: false
    plugin_skills: false

  - name: "C1_graph_git"
    repowise_enabled: true
    repowise_mode: "index-only"
    claude_md: false
    plugin_skills: false

  # C2_full disabled — full-mode indexing times out on large repos (django)
  # - name: "C2_full"
  #   repowise_enabled: true
  #   repowise_mode: "full"
  #   claude_md: false
  #   plugin_skills: false

agent:
  model: "sonnet"
  max_turns: 15
  timeout_seconds: 1200   # 20 min — generous for large repos with repowise tools

repowise:
  binary: "repowise"
  index_dir: "./indexes"
  doc_model: "gemini-3.1-flash-lite-preview"

paths:
  results_dir: "./results/swe_qa_c2_test"
  repos_dir: "./repos"
  logs_dir: "./logs/swe_qa_c2_test"

budget:
  max_total_usd: 150.0
  max_per_task_usd: 5.0
  abort_on_exceed: true

evaluation:
  judge_model: "sonnet"
  dimensions: ["correctness", "completeness", "relevance", "clarity", "reasoning"]

parallelism:
  max_workers: 1   # sequential — C1 and C2 use different indexes on same repo

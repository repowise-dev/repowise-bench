experiment_name: "swe_qa_smoke_test"

benchmarks:
  swe_qa:
    enabled: true
    max_tasks: 3      # just 3 tasks from django
    repos:
      - "django/django"
  swe_bench:
    enabled: false
  fea_bench:
    enabled: false

conditions:
  - name: "C0_bare"
    repowise_enabled: false
    repowise_mode: null
    claude_md: false
    plugin_skills: false

  - name: "C1_graph_git"
    repowise_enabled: true
    repowise_mode: "index-only"
    claude_md: false
    plugin_skills: false

agent:
  model: "sonnet"
  max_turns: 15
  timeout_seconds: 300

repowise:
  binary: "repowise"
  index_dir: "./indexes"
  doc_model: "gemini-3.1-flash-lite-preview"

paths:
  results_dir: "./results/swe_qa_smoke_test"
  repos_dir: "./repos"
  logs_dir: "./logs/swe_qa_smoke_test"

budget:
  max_total_usd: 10.0
  max_per_task_usd: 2.0
  abort_on_exceed: true

evaluation:
  judge_model: "sonnet"
  dimensions: ["correctness", "completeness", "relevance", "clarity", "reasoning"]

parallelism:
  max_workers: 1

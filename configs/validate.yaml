# Quick validation: 2 Flask tasks x 2 conditions = 4 runs
# Should take ~5-10 min, ~$1-2

experiment_name: "validate"

benchmarks:
  swe_qa:
    enabled: true
    max_tasks: 2
    repos: ["pallets/flask"]
  swe_bench:
    enabled: false
  fea_bench:
    enabled: false

conditions:
  - name: "C0_bare"
    repowise_enabled: false
    repowise_mode: null
    claude_md: false
    plugin_skills: false
  - name: "C1_graph_git"
    repowise_enabled: true
    repowise_mode: "index-only"
    claude_md: false
    plugin_skills: false

agent:
  model: "sonnet"
  max_turns: 15
  timeout_seconds: 180

repowise:
  binary: "repowise"
  index_dir: "./indexes"
  doc_model: "gemini-2.0-flash-lite"

paths:
  results_dir: "./results/validate"
  repos_dir: "./repos"
  logs_dir: "./logs/validate"

budget:
  max_total_usd: 5.0
  max_per_task_usd: 2.0
  abort_on_exceed: true

evaluation:
  judge_model: "sonnet"

parallelism:
  max_workers: 1   # sequential for validation

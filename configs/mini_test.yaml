# Mini test: 3 hand-crafted questions against local repowise repo
# Validates the full pipeline before using real benchmark datasets

experiment_name: "mini_test"

benchmarks:
  swe_qa:
    enabled: true
    max_tasks: 3
    question_types: ["What", "How", "Where"]
    repos: ["local/repowise"]

  swe_bench:
    enabled: false
    max_tasks: 0

  fea_bench:
    enabled: false
    max_tasks: 0

conditions:
  - name: "C0_bare"
    repowise_enabled: false
    repowise_mode: null
    claude_md: false
    plugin_skills: false

agent:
  model: "sonnet"
  max_turns: 10
  timeout_seconds: 120

repowise:
  binary: "repowise"
  index_dir: "./indexes"
  doc_model: "gemini-2.0-flash-lite"

paths:
  results_dir: "./results/mini_test"
  repos_dir: "./repos"
  logs_dir: "./logs/mini_test"

# Tight budget for testing
budget:
  max_total_usd: 2.0
  max_per_task_usd: 1.0
  abort_on_exceed: true

evaluation:
  judge_model: "claude-sonnet-4-20250514"
  dimensions: ["correctness", "completeness", "relevance", "clarity", "reasoning"]
  judge_temperature: 0.0
  num_judge_runs: 1

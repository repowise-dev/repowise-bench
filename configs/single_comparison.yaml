# Single-task C0 vs C2 comparison
# Validates that repowise MCP integration works end-to-end

experiment_name: "single_comparison"

benchmarks:
  swe_qa:
    enabled: true
    max_tasks: 1
    question_types: ["How"]
    repos: ["local/repowise"]

  swe_bench:
    enabled: false
    max_tasks: 0

  fea_bench:
    enabled: false
    max_tasks: 0

conditions:
  - name: "C0_bare"
    repowise_enabled: false
    repowise_mode: null
    claude_md: false
    plugin_skills: false

  - name: "C2_full"
    repowise_enabled: true
    repowise_mode: "full"
    claude_md: false
    plugin_skills: false

agent:
  model: "sonnet"
  max_turns: 15
  timeout_seconds: 180

repowise:
  binary: "repowise"
  index_dir: "./indexes"
  doc_model: "gemini-2.0-flash-lite"

paths:
  results_dir: "./results/single_comparison"
  repos_dir: "./repos"
  logs_dir: "./logs/single_comparison"

budget:
  max_total_usd: 3.0
  max_per_task_usd: 1.0
  abort_on_exceed: true

evaluation:
  judge_model: "sonnet"
  dimensions: ["correctness", "completeness", "relevance", "clarity", "reasoning"]
  judge_temperature: 0.0
  num_judge_runs: 1
